services:
  postgres:
    image: postgres:16-alpine   # 16 = current stable major; alpine keeps image small for local dev
    container_name: aml_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data   # named volume: data survives container recreation
    healthcheck:
      # Ingestion scripts and Alembic must wait for real readiness, not just
      # "container started" — pg_isready checks Postgres can accept connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data: